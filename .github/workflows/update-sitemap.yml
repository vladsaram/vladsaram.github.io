name: Update Sitemap

on:
  push:
    branches:
      - main
    paths:
      - 'articles/**'
      - 'blog/**'
      - 'gpt-shashlik/**'
  workflow_dispatch:

concurrency:
  group: site-autocommit
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap
        run: |
          python3 - << 'PYEOF'
          import os
          from datetime import date, datetime

          today = date.today().isoformat()
          base = "https://saramudvlad.ru"
          urls = []

          urls.append(("", "weekly", "1.0", today))
          urls.append(("services/", "monthly", "0.9", today))
          urls.append(("gpt-shashlik/", "weekly", "0.9", today))
          urls.append(("blog/", "daily", "0.9", today))

          articles_dir = "articles"
          if os.path.isdir(articles_dir):
              for entry in sorted(os.scandir(articles_dir), key=lambda e: e.name, reverse=True):
                  if entry.is_dir() and os.path.exists(os.path.join(entry.path, "index.html")):
                      slug = entry.name
                      mtime = os.path.getmtime(os.path.join(entry.path, "index.html"))
                      lastmod = datetime.fromtimestamp(mtime).strftime('%Y-%m-%d')
                      urls.append((f"articles/{slug}/", "monthly", "0.8", lastmod))

          xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n\n'
          for path, freq, priority, lastmod in urls:
              xml += f'  <url>\n'
              xml += f'    <loc>{base}/{path}</loc>\n'
              xml += f'    <lastmod>{lastmod}</lastmod>\n'
              xml += f'    <changefreq>{freq}</changefreq>\n'
              xml += f'    <priority>{priority}</priority>\n'
              xml += f'  </url>\n\n'
          xml += '</urlset>\n'

          with open("sitemap.xml", "w") as f:
              f.write(xml)

          print(f"Done: {len(urls)} URLs")
          PYEOF

      - name: Commit and push sitemap
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sitemap.xml
          if git diff --staged --quiet; then echo "No changes"; exit 0; fi
          git commit -m "Auto-update sitemap"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Retry $i after push race..."; sleep 5
          done
          echo "Push failed after 5 retries"; exit 1
