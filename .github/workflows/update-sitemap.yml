name: Update Sitemap & Internal Links

on:
  push:
    branches:
      - main
    paths:
      - '**/index.html'
      - 'articles.json'
  workflow_dispatch:

concurrency:
  group: site-autocommit
  cancel-in-progress: false

jobs:
  update-sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate sitemap
        run: |
          python3 - << 'PYEOF'
          import os
          from datetime import date, datetime

          today = date.today().isoformat()
          base = "https://saramudvlad.ru"
          EXCLUDE = {"node_modules","dist","src","images","js","articles",".git","admin","private",".github"}
          PRIO = {"blog":("daily","0.9"), "services":("monthly","0.9"), "gpt-shashlik":("weekly","0.9")}

          def lastmod(path):
              try: return datetime.fromtimestamp(os.path.getmtime(path)).strftime('%Y-%m-%d')
              except Exception: return today

          urls = [("", "weekly", "1.0", today)]

          # top-level pages (auto-discovery: any dir with index.html)
          for name in sorted(os.listdir(".")):
              if name in EXCLUDE or not os.path.isdir(name): continue
              if not os.path.exists(os.path.join(name, "index.html")): continue
              if name in PRIO: freq, prio = PRIO[name]
              elif name.startswith("kalkulyator"): freq, prio = "monthly", "0.8"
              else: freq, prio = "monthly", "0.7"
              urls.append((name + "/", freq, prio, lastmod(os.path.join(name, "index.html"))))

          # articles
          if os.path.isdir("articles"):
              for entry in sorted(os.scandir("articles"), key=lambda e: e.name, reverse=True):
                  if entry.is_dir() and os.path.exists(os.path.join(entry.path, "index.html")):
                      urls.append((f"articles/{entry.name}/", "monthly", "0.8", lastmod(os.path.join(entry.path, "index.html"))))

          xml = '<?xml version="1.0" encoding="UTF-8"?>\n'
          xml += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n\n'
          for path, freq, priority, lastmod in urls:
              xml += f'  <url>\n'
              xml += f'    <loc>{base}/{path}</loc>\n'
              xml += f'    <lastmod>{lastmod}</lastmod>\n'
              xml += f'    <changefreq>{freq}</changefreq>\n'
              xml += f'    <priority>{priority}</priority>\n'
              xml += f'  </url>\n\n'
          xml += '</urlset>\n'

          with open("sitemap.xml", "w") as f:
              f.write(xml)

          print(f"Done: {len(urls)} URLs")
          PYEOF

      - name: Generate static internal links
        run: |
          python3 - << 'PYEOF'
          import json, re

          arts = json.load(open("articles.json", encoding="utf-8"))
          items = "".join(
              '<li><a href="%s" class="text-emerald-100/70 transition hover:text-neon">%s</a></li>'
              % (a["url"], a["title"]) for a in arts)
          block = (
              '<!-- STATIC ARTICLE LINKS (crawlable SEO index) -->\n'
              '<section class="border-t border-line bg-ink/40">\n'
              '  <div class="mx-auto max-w-6xl px-6 py-10">\n'
              '    <h2 class="label text-[11px] uppercase tracking-[0.2em] text-emerald-300/50 mb-5">Все статьи блога</h2>\n'
              '    <ul class="grid grid-cols-1 gap-x-8 gap-y-2.5 sm:grid-cols-2 lg:grid-cols-3 text-sm list-none p-0 m-0">'
              + items +
              '</ul>\n'
              '  </div>\n'
              '</section>\n'
          )
          MARK = "STATIC ARTICLE LINKS (crawlable SEO index)"
          for f in ["index.html", "blog/index.html"]:
              s = open(f, encoding="utf-8").read()
              if MARK in s:
                  s = re.sub(r"<!-- " + re.escape(MARK) + r" -->.*?</section>\n", block, s, count=1, flags=re.S)
              else:
                  idx = s.find("<footer")
                  s = s[:idx] + block + "\n" + s[idx:]
              open(f, "w", encoding="utf-8").write(s)
              print(f"links updated: {f} ({len(arts)} links)")
          PYEOF

      - name: Commit and push sitemap & links
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sitemap.xml index.html blog/index.html
          if git diff --staged --quiet; then echo "No changes"; exit 0; fi
          git commit -m "Auto-update sitemap + internal links"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Retry $i after push race..."; sleep 5
          done
          echo "Push failed after 5 retries"; exit 1
