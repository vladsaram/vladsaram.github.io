name: Build Tailwind CSS

on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'src/input.css'
      - 'tailwind.config.js'

concurrency:
  group: site-autocommit
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Tailwind
        run: npx tailwindcss -i ./src/input.css -o ./dist/tailwind.css --minify

      - name: Replace CDN with local CSS in all HTML
        run: |
          find . -name "*.html" -not -path "./.git/*" | while read f; do
            sed -i 's|<script src="https://cdn.tailwindcss.com"></script>|<link rel="stylesheet" href="/dist/tailwind.css">|g' "$f"
          done

      - name: Commit and push if changed
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add dist/tailwind.css
          git add -u
          if git diff --staged --quiet; then echo "No changes"; exit 0; fi
          git commit -m "Auto-build: replace Tailwind CDN with minified CSS"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "Retry $i after push race..."; sleep 5
          done
          echo "Push failed after 5 retries"; exit 1
